<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Transaction</title>
  </head>
  <body>
    <header>
      <h1>My Website</h1>
      <div class="toggle">
        <span class="label">Light</span>
        <button class="switch" id="toggleBtn">
          <span class="slider"></span>
        </button>
        <span class="label">Dark</span>
      </div>
    </header>
    <form class="form" id="form" action="">
      <h1>Transaction</h1>
      <p class="solde" id="solde"></p>
      <input
        class="input"
        type="number"
        id="input"
        placeholder="Veuillez enter le montant du retrait"
      />
      <button type="submit" class="btn">Envoyer</button>
      <div class="tictac">
        <span id="minutes"></span>
        <span id="secondes"></span>
        <button type="submit" id="btn1" class="btn1">Stopper</button>
      </div>
    </form>
  </body>
  <script src="script.js"></script>
</html>
